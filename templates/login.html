<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - LINE AI 預約系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Apple-style Design System */
        :root {
            --apple-black: #000000;
            --apple-white: #ffffff;
            --apple-gray-50: #f9f9f9;
            --apple-gray-100: #f5f5f7;
            --apple-gray-200: #e8e8ed;
            --apple-gray-300: #d2d2d7;
            --apple-gray-400: #b0b0b8;
            --apple-gray-500: #8e8e93;
            --apple-gray-600: #636366;
            --apple-gray-700: #48484a;
            --apple-gray-800: #3a3a3c;
            --apple-gray-900: #1d1d1f;
            --apple-blue: #007aff;
            --apple-green: #34c759;
            --apple-red: #ff3b30;
            --apple-shadow: 0 4px 16px rgba(0,0,0,0.1);
            --apple-shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --apple-border-radius: 12px;
            --apple-border-radius-sm: 8px;
            --apple-border-radius-lg: 16px;
            --apple-transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--apple-gray-50);
            color: var(--apple-black);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--apple-white);
            border-radius: var(--apple-border-radius-lg);
            box-shadow: var(--apple-shadow);
            overflow: hidden;
            max-width: 1000px;
            width: 90%;
            margin: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .login-image {
            background: var(--apple-black);
            color: var(--apple-white);
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,122,255,0.1) 0%, rgba(0,0,0,0.05) 100%);
            pointer-events: none;
        }

        .login-image h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .login-image p {
            color: var(--apple-gray-400);
            font-size: 16px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            text-align: left;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .feature-list li {
            padding: 16px 20px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: var(--apple-border-radius);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--apple-gray-300);
            font-size: 14px;
            font-weight: 500;
            transition: var(--apple-transition);
            display: flex;
            align-items: center;
        }

        .feature-list li:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateX(4px);
        }

        .feature-list li i {
            margin-right: 16px;
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .login-form {
            padding: 80px 60px;
            background: var(--apple-white);
        }

        .login-form h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--apple-black);
            margin-bottom: 40px;
            text-align: center;
        }

        .form-floating {
            margin-bottom: 24px;
        }

        .form-control {
            border: 1px solid var(--apple-gray-300);
            border-radius: var(--apple-border-radius);
            padding: 16px 20px;
            font-size: 16px;
            transition: var(--apple-transition);
            background: var(--apple-white);
            height: 60px;
        }

        .form-control:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
            outline: none;
        }

        .form-floating label {
            color: var(--apple-gray-600);
            font-weight: 600;
            font-size: 14px;
            padding: 1rem 0.75rem;
        }

        .form-check {
            margin-bottom: 24px;
        }

        .form-check-input {
            width: 20px;
            height: 20px;
            border: 2px solid var(--apple-gray-300);
            border-radius: var(--apple-border-radius-sm);
            transition: var(--apple-transition);
        }

        .form-check-input:checked {
            background: var(--apple-blue);
            border-color: var(--apple-blue);
        }

        .form-check-label {
            color: var(--apple-gray-700);
            font-weight: 500;
            font-size: 14px;
            margin-left: 12px;
        }

        .btn-primary {
            background: var(--apple-black);
            color: var(--apple-white);
            border: none;
            border-radius: var(--apple-border-radius);
            padding: 16px 32px;
            font-weight: 600;
            font-size: 16px;
            transition: var(--apple-transition);
            width: 100%;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover {
            background: var(--apple-gray-800);
            transform: translateY(-1px);
            box-shadow: var(--apple-shadow-sm);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .nav-tabs {
            border-bottom: 2px solid var(--apple-gray-200);
            margin-bottom: 40px;
            background: var(--apple-white);
            padding: 0 20px;
            border-radius: var(--apple-border-radius) var(--apple-border-radius) 0 0;
        }

        .nav-tabs .nav-link {
            border: none;
            color: var(--apple-gray-500);
            font-weight: 600;
            padding: 16px 24px;
            border-radius: var(--apple-border-radius) var(--apple-border-radius) 0 0;
            transition: var(--apple-transition);
            background: transparent;
            font-size: 15px;
        }

        .nav-tabs .nav-link:hover {
            color: var(--apple-black);
            background: var(--apple-gray-50);
        }

        .nav-tabs .nav-link.active {
            color: var(--apple-black);
            background: var(--apple-white);
            border-bottom: 2px solid var(--apple-black);
            margin-bottom: -2px;
        }

        .alert {
            border: none;
            border-radius: var(--apple-border-radius);
            padding: 16px 20px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .alert-danger {
            background: rgba(255,59,48,0.1);
            color: var(--apple-red);
            border-left: 4px solid var(--apple-red);
        }

        .text-decoration-none {
            color: var(--apple-blue);
            text-decoration: none;
            font-weight: 500;
            transition: var(--apple-transition);
        }

        .text-decoration-none:hover {
            color: var(--apple-gray-700);
            text-decoration: underline;
        }

        .spinner-border {
            border: 2px solid var(--apple-gray-200);
            border-top: 2px solid var(--apple-white);
            border-radius: 50%;
            width: 16px;
            height: 16px;
        }

        /* Responsive */
        @media (max-width: 991px) {
            .login-image {
                padding: 60px 40px;
            }
            
            .login-form {
                padding: 60px 40px;
            }
        }

        @media (max-width: 768px) {
            .login-container {
                width: 95%;
                margin: 10px;
            }
            
            .login-image {
                padding: 40px 20px;
            }
            
            .login-form {
                padding: 40px 20px;
            }
            
            .login-image h1 {
                font-size: 24px;
            }
            
            .login-form h2 {
                font-size: 24px;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--apple-gray-100);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--apple-gray-400);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--apple-gray-500);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="row g-0">
            <div class="col-lg-5">
                <div class="login-image">
                    <h1>🤖 LINE AI 預約系統</h1>
                    <p>智能客服自動預約解決方案</p>
                    <ul class="feature-list">
                        <li>
                            <i class="fas fa-brain"></i>
                            <span>AI 智能客服</span>
                        </li>
                        <li>
                            <i class="fab fa-line"></i>
                            <span>LINE 整合</span>
                        </li>
                        <li>
                            <i class="fas fa-calendar-alt"></i>
                            <span>自動排程</span>
                        </li>
                        <li>
                            <i class="fas fa-store"></i>
                            <span>商家管理</span>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="login-form">
                    <h2>歡迎回來</h2>
                    
                    <!-- 登入/註冊 Tab -->
                    <ul class="nav nav-tabs justify-content-center" id="authTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">登入</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">註冊</button>
                        </li>
                    </ul>
                    
                    <div class="tab-content" id="authTabContent">
                        <!-- 登入表單 -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                            <form method="POST" action="/login">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="login-username" name="username" placeholder="使用者名稱" required>
                                    <label for="login-username">使用者名稱</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="login-password" name="password" placeholder="密碼" required>
                                    <label for="login-password">密碼</label>
                                </div>
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="remember-me">
                                    <label class="form-check-label" for="remember-me">
                                        記住我
                                    </label>
                                </div>
                                <button type="submit" class="btn btn-primary mb-4">登入</button>
                                <div class="text-center">
                                    <a href="#" class="text-decoration-none">忘記密碼？</a>
                                </div>
                            </form>
                        </div>
                        
                        <!-- 註冊表單 -->
                        <div class="tab-pane fade" id="register" role="tabpanel">
                            <form method="POST" action="/register">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="register-username" name="username" placeholder="使用者名稱" required>
                                    <label for="register-username">使用者名稱</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="register-email" name="email" placeholder="電子郵件" required>
                                    <label for="register-email">電子郵件</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="register-password" name="password" placeholder="密碼" required minlength="6">
                                    <label for="register-password">密碼（至少6位）</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="register-confirm-password" name="confirm_password" placeholder="確認密碼" required>
                                    <label for="register-confirm-password">確認密碼</label>
                                </div>
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="agree-terms" required>
                                    <label class="form-check-label" for="agree-terms">
                                        我同意<a href="#" class="text-decoration-none">服務條款</a>
                                    </label>
                                </div>
                                <button type="submit" class="btn btn-primary">註冊帳號</button>
                            </form>
                        </div>
                    </div>
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 密碼確認驗證
        document.getElementById('register-confirm-password').addEventListener('input', function() {
            const password = document.getElementById('register-password').value;
            const confirmPassword = this.value;
            
            if (password !== confirmPassword) {
                this.setCustomValidity('密碼不匹配');
            } else {
                this.setCustomValidity('');
            }
        });
        
        // 表單提交驗證
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function(e) {
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>處理中...';
            });
        });

        // Tab 切換動畫
        document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tab => {
            tab.addEventListener('click', function() {
                const target = this.dataset.bsTarget;
                const targetPane = document.querySelector(target);
                
                // 添加淡入效果
                setTimeout(() => {
                    targetPane.classList.add('show');
                }, 50);
            });
        });
    </script>
</body>
</html>
